<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Natkhat Nx – Women's Ethnic Wear Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --rose:#c9705a;--rose2:#e8896f;--gold:#c9a84c;--gold2:#e8cc7a;
      --cream:#fdf6ee;--blush:#fce8df;--plum:#4a1535;--plum2:#6b2050;
      --dark:#1e1210;--muted:#7a5c52;--border:rgba(201,112,90,.18);
    }
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}

    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 5%;background:rgba(253,246,238,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:.04em;color:var(--dark);text-decoration:none}
    .nav-logo span{color:var(--rose)}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .25s}
    .nav-links a:hover{color:var(--rose)}
    .nav-cta{display:inline-block;padding:.6rem 1.6rem;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;border-radius:2px;box-shadow:0 4px 18px rgba(201,112,90,.35);transition:all .3s}
    .nav-cta:hover{transform:translateY(-2px)}

    /* HERO */
    #hero{min-height:100vh;display:grid;place-items:center;text-align:center;padding:8rem 5% 5rem;background:radial-gradient(ellipse 90% 70% at 50% -10%,#f5cfc0 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 90% 80%,#e8d4f0 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 10% 80%,#fde8cc 0%,transparent 55%),var(--cream);position:relative;overflow:hidden}
    #hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:100px;background:linear-gradient(to bottom,transparent,var(--cream))}
    .mandala-bg{position:absolute;width:600px;height:600px;opacity:.05;top:50%;left:50%;transform:translate(-50%,-50%);background:conic-gradient(from 0deg,var(--rose),var(--gold),var(--plum),var(--rose));border-radius:50%;animation:spin 60s linear infinite}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    .petal{position:absolute;pointer-events:none;animation:floatPetal linear infinite}
    @keyframes floatPetal{0%{transform:translateY(0) rotate(0deg);opacity:.15}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}
    .hero-eyebrow{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--rose);margin-bottom:1.2rem;animation:fadeUp .8s ease both;position:relative}
    h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,9vw,7rem);font-weight:400;line-height:1.02;color:var(--dark);animation:fadeUp .9s .1s ease both;position:relative}
    h1 em{font-style:italic;background:linear-gradient(135deg,var(--rose),var(--plum));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{margin:1.5rem auto 0;max-width:500px;font-size:1rem;line-height:1.75;color:var(--muted);animation:fadeUp 1s .2s ease both;position:relative}
    .hero-cta{margin-top:2.8rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:fadeUp 1s .35s ease both;position:relative}
    .hero-stats{margin-top:3.5rem;display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;animation:fadeUp 1s .5s ease both;position:relative}
    .stat-item{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}

    /* BUTTONS */
    .btn{display:inline-block;padding:.85rem 2.2rem;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:all .3s;font-family:'DM Sans',sans-serif;cursor:pointer;border:none}
    .btn-primary{background:linear-gradient(135deg,var(--rose),#b8503e);color:#fff;box-shadow:0 6px 24px rgba(201,112,90,.4)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(201,112,90,.5)}
    .btn-outline{border:1.5px solid var(--rose);color:var(--rose);background:transparent}
    .btn-outline:hover{background:var(--rose);color:#fff}
    .btn-gold{background:linear-gradient(135deg,var(--gold),#b8903a);color:#fff;box-shadow:0 6px 24px rgba(201,168,76,.4)}
    .btn-gold:hover{transform:translateY(-2px)}

    /* SHARED */
    section{padding:6rem 5%}
    .section-label{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--rose);margin-bottom:.8rem}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:400;line-height:1.15}
    .section-title em{font-style:italic}
    .divider{width:56px;height:2px;background:linear-gradient(90deg,var(--rose),var(--gold));margin:1.5rem 0;border-radius:2px}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity .75s ease,transform .75s ease}
    .reveal.visible{opacity:1;transform:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* MARQUEE */
    .marquee-wrap{background:linear-gradient(90deg,var(--plum),#7a1a50,var(--plum));overflow:hidden;padding:1rem 0}
    .marquee-track{display:flex;gap:3rem;animation:marquee 24s linear infinite;white-space:nowrap}
    .marquee-item{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--gold2);letter-spacing:.18em;text-transform:uppercase;flex-shrink:0}
    .marquee-dot{color:var(--rose2);margin:0 .6rem}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* CATEGORIES */
    #categories{background:linear-gradient(160deg,#fef0e8 0%,var(--cream) 60%)}
    .categories-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1.5rem;margin-top:3rem}
    .cat-card{border:1px solid var(--border);padding:2.5rem 1.2rem;text-align:center;transition:all .35s;cursor:pointer;position:relative;overflow:hidden;background:#fff}
    .cat-card .card-bg{position:absolute;inset:0;opacity:0;transition:opacity .4s}
    .cat-card:nth-child(1) .card-bg{background:linear-gradient(135deg,#fce8df,#fbd4c5)}
    .cat-card:nth-child(2) .card-bg{background:linear-gradient(135deg,#e8d4f0,#d4b8e8)}
    .cat-card:nth-child(3) .card-bg{background:linear-gradient(135deg,#d4eaf0,#b8dde8)}
    .cat-card:nth-child(4) .card-bg{background:linear-gradient(135deg,#f0e8d4,#e8d4a8)}
    .cat-card:nth-child(5) .card-bg{background:linear-gradient(135deg,#f0d4e8,#e8b8d4)}
    .cat-card:hover .card-bg{opacity:1}
    .cat-card:hover{transform:translateY(-6px);border-color:transparent;box-shadow:0 16px 40px rgba(74,21,53,.12)}
    .cat-icon{font-size:2.5rem;margin-bottom:1rem;position:relative;display:block;transition:transform .3s}
    .cat-card:hover .cat-icon{transform:scale(1.2)}
    .cat-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:400;position:relative}
    .cat-desc{font-size:.78rem;color:var(--muted);margin-top:.4rem;position:relative}

    /* ══ BRIDAL SECTION ══ */
    #bridal{background:linear-gradient(160deg,var(--plum) 0%,#2d0a22 50%,#1a0515 100%);position:relative;overflow:hidden;padding:7rem 5%}
    #bridal::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(201,112,90,.2) 0%,transparent 70%);pointer-events:none}
    #bridal::after{content:'';position:absolute;bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%);pointer-events:none}
    #bridal .section-label{color:var(--gold2)}
    #bridal .section-title{color:#fff}
    #bridal .section-title em{color:var(--gold)}
    #bridal .divider{background:linear-gradient(90deg,var(--gold),var(--rose))}
    .bridal-intro{max-width:520px;color:rgba(255,255,255,.7);font-size:.95rem;line-height:1.8;margin-top:1rem}
    .bridal-showcase{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:3rem}
    .bridal-hero-card{grid-column:1/2;grid-row:1/3;position:relative;overflow:hidden;min-height:500px;background:linear-gradient(160deg,#3d0a2e,#6b1a4a);border:1px solid rgba(201,168,76,.25);cursor:pointer;transition:transform .4s,box-shadow .4s}
    .bridal-hero-card:hover{transform:scale(1.01);box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .bridal-small-card{position:relative;overflow:hidden;min-height:230px;background:linear-gradient(160deg,#3d0a2e,#5a1040);border:1px solid rgba(201,168,76,.2);cursor:pointer;transition:all .35s}
    .bridal-small-card:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.5)}
    .bridal-card-inner{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2rem}
    .bridal-card-emoji{position:absolute;top:50%;left:50%;transform:translate(-50%,-65%);font-size:5rem;opacity:.5;transition:all .4s}
    .bridal-hero-card:hover .bridal-card-emoji{transform:translate(-50%,-65%) scale(1.15);opacity:.7}
    .bridal-small-card .bridal-card-emoji{font-size:3rem;top:40%}
    .bridal-small-card:hover .bridal-card-emoji{transform:translate(-50%,-60%) scale(1.15);opacity:.7}
    .bridal-card-tag{display:inline-block;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;background:rgba(201,168,76,.25);color:var(--gold2);padding:.25rem .75rem;margin-bottom:.7rem;border:1px solid rgba(201,168,76,.3)}
    .bridal-card-name{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;font-weight:400}
    .bridal-hero-card .bridal-card-name{font-size:2.2rem}
    .bridal-card-price{font-size:.88rem;color:rgba(255,255,255,.6);margin-top:.3rem}
    .bridal-card-price strong{color:var(--gold2);font-weight:500}
    .bridal-card-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
    .ornament{text-align:center;font-size:1.4rem;color:var(--gold);opacity:.5;margin:1rem 0;letter-spacing:.5rem}
    .bridal-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.5rem;margin-top:3rem}
    .bridal-feat{text-align:center;padding:1.5rem 1rem;border:1px solid rgba(201,168,76,.2);background:rgba(255,255,255,.04);transition:all .3s}
    .bridal-feat:hover{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.4)}
    .bridal-feat-icon{font-size:1.8rem;margin-bottom:.8rem}
    .bridal-feat-title{font-family:'Playfair Display',serif;font-size:1rem;color:#fff}
    .bridal-feat-text{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:.4rem;line-height:1.6}

    /* ══ PRODUCT MODAL ══ */
    .modal-overlay{position:fixed;inset:0;background:rgba(10,2,8,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .35s;backdrop-filter:blur(8px)}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal-box{background:#fff;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;position:relative;display:grid;grid-template-columns:1fr 1fr;animation:modalIn .4s ease}
    @keyframes modalIn{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
    @media(max-width:600px){.modal-box{grid-template-columns:1fr}}
    .modal-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;background:var(--plum);color:#fff;border:none;cursor:pointer;font-size:1.2rem;display:grid;place-items:center;z-index:10;border-radius:50%;transition:background .2s}
    .modal-close:hover{background:var(--rose)}
    .modal-gallery{background:linear-gradient(160deg,#fce8df,#f5d4e8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;min-height:320px;gap:1rem}
    .modal-main-img{width:100%;max-height:300px;object-fit:contain;border-radius:2px;transition:opacity .3s}
    .modal-main-img.emoji-display{font-size:8rem;text-align:center;line-height:1;display:block}
    .modal-thumbs{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
    .modal-thumb{width:56px;height:56px;object-fit:cover;border:2px solid transparent;cursor:pointer;border-radius:2px;transition:border-color .2s;background:#fce8df;display:flex;align-items:center;justify-content:center;font-size:1.6rem}
    .modal-thumb.active{border-color:var(--plum)}
    .modal-info{padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1rem}
    .modal-tag{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;background:rgba(74,21,53,.1);color:var(--plum);padding:.25rem .8rem;display:inline-block;width:fit-content}
    .modal-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;line-height:1.15}
    .modal-price{font-size:1.3rem;color:var(--rose);font-weight:500}
    .modal-price s{color:var(--muted);font-size:1rem;font-weight:300;margin-left:.5rem}
    .modal-desc{font-size:.88rem;color:var(--muted);line-height:1.75}
    .modal-details{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
    .modal-detail-item{font-size:.8rem;color:var(--dark)}
    .modal-detail-item span{color:var(--muted);display:block;font-size:.72rem;margin-bottom:.1rem}
    .modal-actions{display:flex;flex-direction:column;gap:.8rem;margin-top:.5rem}
    .modal-whatsapp{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.85rem;background:#25d366;color:#fff;text-decoration:none;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;transition:background .2s}
    .modal-whatsapp:hover{background:#1fb85a}

    /* ══ FEATURED / NEW ARRIVALS ══ */
    #featured{background:linear-gradient(160deg,#fff4ee 0%,var(--cream) 100%)}
    .featured-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2rem;margin-top:3rem}
    .product-card{background:#fff;border:1px solid var(--border);overflow:hidden;transition:box-shadow .35s,transform .35s;cursor:pointer}
    .product-card:hover{box-shadow:0 20px 56px rgba(74,21,53,.14);transform:translateY(-6px)}
    .product-img{height:280px;display:grid;place-items:center;font-size:4.5rem;position:relative;overflow:hidden}
    .product-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .product-card:hover .product-img img{transform:scale(1.08)}
    .product-img .emoji-fallback{font-size:4.5rem;transition:transform .4s}
    .product-card:hover .emoji-fallback{transform:scale(1.15)}
    .pi-1{background:linear-gradient(135deg,#fce8df,#f5d5e8)}
    .pi-2{background:linear-gradient(135deg,#e8d4f0,#d4c5f5)}
    .pi-3{background:linear-gradient(135deg,#d4eaf0,#c5ddf5)}
    .pi-4{background:linear-gradient(135deg,#f0e8d4,#f5e0c5)}
    .product-badge{position:absolute;top:1rem;left:1rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;padding:.25rem .8rem}
    .badge-rose{background:var(--rose)}.badge-plum{background:var(--plum)}.badge-gold{background:var(--gold);color:var(--dark)}
    .product-info{padding:1.2rem 1.4rem 1.6rem}
    .product-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400}
    .product-price{margin-top:.5rem;font-size:.95rem;color:var(--rose);font-weight:500}
    .product-price s{color:var(--muted);font-weight:300;margin-left:.4rem;font-size:.85rem}
    .add-btn{display:block;width:100%;margin-top:1rem;padding:.7rem;text-align:center;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1.5px solid var(--rose);color:var(--rose);cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif}
    .add-btn:hover{background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;border-color:transparent}
    .product-delete{display:block;width:100%;margin-top:.4rem;padding:.4rem;text-align:center;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;background:transparent;border:1px solid #e0c0c0;color:#c08080;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
    .product-delete:hover{background:#fff0f0;border
